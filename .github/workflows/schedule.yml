name: attendance
on:
  schedule:
    - cron: '43 2 * * *'
  workflow_dispatch:

jobs:
  attendance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.18.2

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Run attendance for each token
        env:
          SKLAND_TOKENS: ${{ secrets.SKLAND_TOKENS }}
          VMESS_CONFIGS: ${{ secrets.VMESS_CONFIGS }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          BARK_URL: ${{ secrets.BARK_URL }}
          SELECT_CHANNEL: ${{ secrets.SELECT_CHANNEL }}
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq
          curl -L -o v2ray.zip https://github.com/v2fly/v2ray-core/releases/latest/download/v2ray-linux-64.zip
          unzip v2ray.zip

          IFS=',' read -ra TOKENS <<< "$SKLAND_TOKENS"
          IFS=',' read -ra CONFIGS <<< "$VMESS_CONFIGS"

          for i in "${!TOKENS[@]}"; do
            echo "Processing token ${i+1}"
            
            # 设置当前的 VMess 配置
            echo "${CONFIGS[$i]}" > config.json
            
            # 启动 V2Ray
            ./v2ray run -config config.json &
            V2RAY_PID=$!
            sleep 5
            
            # 设置代理环境变量
            export all_proxy=socks5://127.0.0.1:1080
            
            # 运行签到脚本
            SKLAND_TOKEN="${TOKENS[$i]}" pnpm attendance
            
            # 停止 V2Ray
            kill $V2RAY_PID
            wait $V2RAY_PID 2>/dev/null
            
            # 清除代理设置
            unset all_proxy
            
            echo "Finished processing token ${i+1}"
          done
